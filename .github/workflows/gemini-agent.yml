name: Gemini Issue Resolver

on:
  issues:
    types: [assigned]

jobs:
  gemini_agent_run:
    # Only run if assigned to the specific bot account
    if: github.event.assignee.login == 'kickstart530'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          ref: ${{ github.event.repository.default_branch }}
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Agent Dependencies
        run: pip install google-generativeai PyGithub
        
      - name: Run Gemini Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
        run: |
          echo "Checked out commit: $(git rev-parse HEAD)"
          echo "Workspace: ${{ github.workspace }}"
          ls -la "${{ github.workspace }}"
          SCRIPT_PATH="${{ github.workspace }}/.github/scripts/agent.py"
          if [ ! -f "$SCRIPT_PATH" ]; then
            echo "Missing script at: $SCRIPT_PATH"
            echo "Contents of .github:"
            ls -la "${{ github.workspace }}/.github" || true
            echo "Contents of checkout:"
            ls -la "${{ github.workspace }}"
            exit 1
          fi
          python "$SCRIPT_PATH"
